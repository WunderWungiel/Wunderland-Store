<!DOCTYPE html PUBLIC "-//WAPFORUM//DTD XHTML Mobile 1.0//EN" "http://www.wapforum.org/DTD/xhtml-mobile10.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en" xml:lang="en">
    <head>
        <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=UTF-8"/>
        <meta name="navigation" content="cursor" />
        <title>Login • Wunderland Store</title>        
        <link type="text/css" rel="stylesheet" media="all" charset="utf-8" href="{{ url_for('static', filename='css/global-min.css') }}" />
        <link type="text/css" rel="stylesheet" media="all" charset="utf-8" href="{{ url_for('static', filename='css/style.css') }}" />
        <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon" />
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    </head>

    <body>
        <div id="wrapper">
            <div id="header">
                <div id="top">
                    <table>
                        <tr>
                            <td id="logo">
                                <a id="logoImg" href="{{ url_for('store.root') }}"><img src="{{ url_for('static', filename='img/logo_wunderland.png') }}" alt="Wunderland Store" /></a>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <div id="views">
                <div class="view">
                    <div class="contentItem">
                        <div id="loginField">
                            <form action="{{ url_for('auth.login') }}" method="POST" id="loginForm" onsubmit="return validateLoginForm()">
                                <fieldset>
                                    <label for="email" id="email_label">E-mail address: <span class="required">*</span></label>
                                    <input type="text" id="email" name="email" size="15" style="width: 63%; max-width: 300px;" title="" />
                                    <span id="email_tip" class="tip">Wrong e-mail address.</span>

                                    <br/>

                                    <label for="password" id="password_label">Password: <span class="required">*</span></label>
                                    <input type="password" id="password" name="password" size="15" style="width: 63%; max-width: 300px;" title="" />
                                    
                                    <br/><br/>
                                    
                                    <input type="submit" id="loginBtn" value="Login" />

                                    <br/><br/>
                                    <label for="loginBtn">Don't have an account yet?&nbsp;</label>
                                    <input type="button" class="Btn" value="Register" data-url="{{ url_for('auth.register') }}" onclick="window.location.href=this.getAttribute('data-url')" />
                                </fieldset>
                            </form>
                        </div>
                    </div>

                    <div class="beacon"></div>
                </div>
            </div>

            <div id="bottom"></div>
                        
            <div id="footer">
                <a href="{{ url_for('store.download') }}">Download</a>
                <br/>
                © Wunder Wungiel {{ now.year }}
            </div>

        </div>
    </body>
</html>
